<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyX Premium</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:linear-gradient(180deg,#020617,#0f172a);
color:white;
overflow-x:hidden;
}
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:.25;
z-index:-1;
animation:move 25s linear infinite;
}
@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(200px);}
}
.logo{
text-align:center;
padding:30px;
font-size:42px;
font-weight:bold;
color:#4ade80;
}
.hero{
text-align:center;
padding:60px 20px;
}
.hero h1{
font-size:56px;
margin-bottom:20px;
}
.hero p{
font-size:20px;
color:#cbd5e1;
margin-bottom:30px;
}
.btn{
display:inline-block;
padding:18px 40px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:12px;
font-size:20px;
font-weight:bold;
transition:.3s;
}
.btn:hover{
transform:scale(1.05);
}
.cards{
padding:20px;
}
.card{
background:#1e293b;
padding:25px;
margin-bottom:20px;
border-radius:18px;
text-align:center;
}
.card h2{
margin-bottom:10px;
}
.plane{
font-size:60px;
display:inline-block;
animation:fly 4s infinite ease-in-out;
}
@keyframes fly{
0%{transform:translateX(-20px);}
50%{transform:translateX(20px) translateY(-10px);}
100%{transform:translateX(-20px);}
}
footer{
text-align:center;
padding:30px;
color:#94a3b8;
}
</style>
</head>
<body>
<div class="stars"></div>
<div class="logo">
✈️ FlyX
</div>
<section class="hero">
<div class="plane">✈️</div>
<h1>Fly High With FlyX</h1>
<p>Premium Gaming Experience</p>
<a href="#" class="btn">Play Now</a>
</section>
<div class="cards">
<div class="card">
<h2>⚡ Fast Gameplay</h2>
<p>Smooth and modern gaming experience.</p>
</div>
<div class="card">
<h2>🚀 Premium Design</h2>
<p>Dark futuristic interface optimized for mobile.</p>
</div>
<div class="card">
<h2>🎮 Next Generation</h2>
<p>Built for speed, performance and style.</p>
</div>
</div>
<footer>
© 2026 FlyX. All Rights Reserved.
</footer>
</body>
</html>
``
