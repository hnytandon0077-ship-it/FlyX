<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyX Ludo</title>
<style>
body{
font-family:Arial,sans-serif;
background:#08133d;
color:white;
text-align:center;
padding:20px;
}
h1{
color:#59d66f;
}
#turn{
font-size:24px;
margin:15px;
}
#dice{
font-size:40px;
margin:20px;
}
button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#3f66ff;
color:white;
}
.board{
width:360px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(10,1fr);
gap:3px;
}
.cell{
height:32px;
background:white;
border-radius:4px;
}
.red{background:red;}
.blue{background:blue;}
.green{background:green;}
.yellow{background:gold;}
</style>
</head>
<body>
<h1>🎲 FlyX Ludo</h1>
<div id="turn">Turn: Red</div>
<div id="dice">🎲</div>
<button onclick="rollDice()">Roll Dice</button>
<div class="board" id="board"></div>
<script>
const board=document.getElementById("board");
for(let i=0;i<100;i++){
let c=document.createElement("div");
c.className="cell";
board.appendChild(c);
}
const players=["Red","Blue","Green","Yellow"];
let current=0;
function rollDice(){
let d=Math.floor(Math.random()*6)+1;
document.getElementById("dice").innerHTML="🎲 "+d;
current++;
if(current>=players.length){
current=0;
}
document.getElementById("turn").innerHTML=
"Turn: "+players[current];
}
</script>
</body>
</html>
