<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyX Ludo</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#08133d;
color:white;
padding:20px;
}
.board{
width:300px;
height:300px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:4px;
}
.cell{
background:white;
height:56px;
border-radius:6px;
}
.token{
background:red;
width:30px;
height:30px;
border-radius:50%;
margin:auto;
margin-top:13px;
}
button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#3f66ff;
color:white;
}
#dice{
font-size:28px;
margin:15px;
}
</style>
</head>
<body>
<h1>🎲 FlyX Ludo</h1>
<div id="dice">Roll Dice</div>
<button onclick="rollDice()">Roll</button>
<div class="board" id="board"></div>
<script>
const board=document.getElementById("board");
for(let i=0;i<25;i++){
let cell=document.createElement("div");
cell.className="cell";
board.appendChild(cell);
}
let position=0;
board.children[0].innerHTML='<div class="token"></div>';
function rollDice(){
let dice=Math.floor(Math.random()*6)+1;
document.getElementById("dice").innerText="Dice: "+dice;
board.children[position].innerHTML="";
position+=dice;
if(position>24){
alert("🏆 You Win!");
position=0;
}
board.children[position].innerHTML='<div class="token"></div>';
}
</script>
</body>
</html>
