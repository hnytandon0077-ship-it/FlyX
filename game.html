<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyX Game</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07133a;
color:white;
text-align:center;
}

.header{
padding:20px;
font-size:38px;
font-weight:bold;
color:#4ade80;
}

.game-box{
margin:20px;
padding:20px;
background:#111c44;
border-radius:20px;
}

.multiplier{
font-size:70px;
font-weight:bold;
color:#4ade80;
margin:30px 0;
}

.plane{
font-size:70px;
animation:fly 2s infinite alternate;
}

@keyframes fly{
from{transform:translateX(-20px);}
to{transform:translateX(20px);}
}

input{
width:80%;
padding:15px;
border:none;
border-radius:10px;
font-size:20px;
margin-top:20px;
text-align:center;
}

.btn{
display:block;
width:80%;
margin:15px auto;
padding:15px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:12px;
color:white;
}

.bet{
background:#2563eb;
}

.cash{
background:#22c55e;
}

.results{
margin:20px;
padding:20px;
background:#111c44;
border-radius:20px;
font-size:22px;
}

.footer{
margin-top:30px;
padding:20px;
color:#aaa;
}
</style>
</head>

<body>

<div class="header">✈️ FlyX Game</div>

<div class="game-box">

<div class="plane">✈️</div>

<div class="multiplier" id="multi">1.00x</div>

<input type="number" placeholder="Enter Bet Amount">

<button class="btn bet">🎮 Place Bet</button>

<button class="btn cash">💰 Cash Out</button>

</div>

<div class="results">
📜 Recent Results<br><br>
2.34x • 4.89x • 1.25x • 7.11x • 3.67x
</div>

<div class="footer">
© 2026 FlyX
</div>

<script>
let value = 1.00;

setInterval(()=>{
value += 0.01;
document.getElementById("multi").innerHTML =
value.toFixed(2) + "x";
},100);
</script>

</body>
</html>
